<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zadanie 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-6 bg-white text-gray-800">

    <h1 class="text-2xl font-bold text-blue-600">Kalkulator Dni Urodzinowych</h1>

    <form id="birthdayForm" class="mt-4">
      <label for="birthDate" class="block mb-2">Wybierz datę urodzenia:</label>
      <input type="date" id="birthDate" required class="border p-2 rounded" />
      <br /><br />
      
      <button type="submit" class="bg-blue-500 text-white p-3 rounded font-semibold hover:bg-blue-600 transition">
        Oblicz dni
      </button>
    </form>

    <dialog id="resultDialog" class="bg-gray-100 text-gray-900 p-6 rounded-lg shadow-xl relative backdrop:bg-black/50">
      <button id="closeDialog" class="absolute top-2 right-3 font-bold text-xl text-gray-500 hover:text-black">&times;</button>
      <div id="dialogContent" class="mt-2 text-lg"></div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    
    <script src="main.js"></script>
  </body>
</html>
